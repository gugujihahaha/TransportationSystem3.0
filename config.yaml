# 交通方式识别模型配置文件

# 数据路径
data:
  geolife_root: "data/Geolife Trajectories 1.3"
  osm_path: "data/beijing_osm_full_enhanced_verified.geojson"  # 使用增强验证后的OSM数据
  # osm_path: "data/export.geojson"  # 原始OSM数据（备用）

# 模型参数
model:
  trajectory_feature_dim: 7
  kg_feature_dim: 11
  hidden_dim: 128
  num_layers: 2
  num_classes: 6  # walk, bike, car, bus, train, taxi
  dropout: 0.3

# 训练参数
training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  train_test_split: 0.2
  random_seed: 42

# 知识图谱参数
knowledge_graph:
  max_poi_distance: 200.0  # 米
  max_road_distance: 50.0  # 米
  road_density_radius: 100.0  # 米

# 轨迹预处理参数
preprocessing:
  min_segment_length: 10
  max_sequence_length: 200
  min_sequence_length: 50

# 路径配置
paths:
  checkpoint_dir: "checkpoints"
  result_dir: "results"
  log_dir: "logs"



