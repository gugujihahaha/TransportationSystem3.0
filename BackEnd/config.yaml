# 交通方式识别模型配置文件

# 数据路径
data:
  geolife_root: "data/Geolife Trajectories 1.3"
  osm_path: "data/beijing_osm_full_enhanced_verified.geojson"
  weather_data_path: "data/weather_data"

# 通用模型参数
model:
  hidden_dim: 128
  num_layers: 2
  num_classes: 7  # Walk, Bike, Bus, Car&taxi, Train, Subway, Airplane
  dropout: 0.3
  num_segments: 5
  local_hidden: 64
  global_hidden: 128

# Exp1: 仅轨迹特征
exp1:
  trajectory_feature_dim: 9
  segment_stats_dim: 18

# Exp2: 轨迹 + 空间特征
exp2:
  trajectory_feature_dim: 9
  spatial_feature_dim: 11
  segment_stats_dim: 18

# Exp3: 轨迹 + 增强空间特征
exp3:
  trajectory_feature_dim: 9
  spatial_feature_dim: 15
  segment_stats_dim: 18

# Exp4: 轨迹 + 空间 + 天气特征
exp4:
  trajectory_feature_dim: 9
  spatial_feature_dim: 15
  weather_feature_dim: 12
  segment_stats_dim: 18

# Exp5: 弱监督上下文表示增强
exp5:
  trajectory_feature_dim: 9
  spatial_feature_dim: 15
  weather_feature_dim: 12
  segment_stats_dim: 18
  context_loss_type: "infonce"
  context_loss_weight: 0.05
  temperature: 0.07

# 训练参数
training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  train_test_split: 0.2
  random_seed: 42

# 轨迹预处理参数
preprocessing:
  min_segment_length: 10
  max_sequence_length: 200
  min_sequence_length: 50
  cleaning_mode: "balanced"

# 路径配置
paths:
  checkpoint_dir: "checkpoints"
  result_dir: "results"
  log_dir: "logs"

  deepseek:
    api_key: "sk-8447085e5bad43ffa6267f85f1f5613f"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"



